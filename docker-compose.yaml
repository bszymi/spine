services:
  spine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8089:8080"
    environment:
      - SPINE_DATABASE_URL=postgres://${POSTGRES_USER:-spine}:${POSTGRES_PASSWORD:-spine}@spine-db:5432/${POSTGRES_DB:-spine}?sslmode=disable
      - SPINE_GIT_REPOSITORY_PATH=/repo
      - SPINE_GIT_AUTHORITATIVE_BRANCH=main
      - SPINE_GIT_WORKTREE_PATH=/var/spine/worktrees
      - SPINE_SERVER_PORT=8080
      - SPINE_PROJECTION_POLLING_INTERVAL=5s
      - SPINE_ORPHAN_THRESHOLD=720h
      - SPINE_LOG_LEVEL=debug
      # Narrow to the compose bridge subnet below, not all RFC1918 space.
      - SPINE_GIT_HTTP_TRUSTED_CIDRS=172.28.0.0/16
      - SPINE_INSECURE_LOCAL=1
    volumes:
      - repo:/repo
      - worktrees:/var/spine/worktrees
    depends_on:
      spine-db:
        condition: service_healthy
    networks:
      - spine-internal
    command: ["serve"]
    healthcheck:
      test: ["CMD", "spine", "health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  spine-db:
    image: postgres:18-bookworm
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-spine}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spine}
      - POSTGRES_DB=${POSTGRES_DB:-spine}
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - spine-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spine}"]
      interval: 5s
      timeout: 3s
      retries: 5

  spine-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPINE_DATABASE_URL=postgres://${POSTGRES_USER:-spine}:${POSTGRES_PASSWORD:-spine}@spine-db:5432/${POSTGRES_DB:-spine}?sslmode=disable
      - SPINE_INSECURE_LOCAL=1
    depends_on:
      spine-db:
        condition: service_healthy
    networks:
      - spine-internal
    command: ["migrate"]
    profiles: ["setup"]

  spine-registry-db:
    image: postgres:18-bookworm
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_REGISTRY_USER:-spine_registry}
      - POSTGRES_PASSWORD=${POSTGRES_REGISTRY_PASSWORD:-spine_registry}
      - POSTGRES_DB=${POSTGRES_REGISTRY_DB:-spine_registry}
    volumes:
      - registrydata:/var/lib/postgresql
    networks:
      - spine-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_REGISTRY_USER:-spine_registry}"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: ["shared"]

  spine-registry-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPINE_DATABASE_URL=postgres://${POSTGRES_REGISTRY_USER:-spine_registry}:${POSTGRES_REGISTRY_PASSWORD:-spine_registry}@spine-registry-db:5432/${POSTGRES_REGISTRY_DB:-spine_registry}?sslmode=disable
      - SPINE_MIGRATIONS_DIR=migrations/registry
      - SPINE_INSECURE_LOCAL=1
    depends_on:
      spine-registry-db:
        condition: service_healthy
    networks:
      - spine-internal
    command: ["migrate"]
    profiles: ["shared"]

  spine-init-repo:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPINE_GIT_REPOSITORY_PATH=/repo
    volumes:
      - repo:/repo
    networks:
      - spine-internal
    command: ["init-repo"]
    profiles: ["setup"]

networks:
  spine-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pgdata:
  registrydata:
  repo:
  worktrees:
