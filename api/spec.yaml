openapi: 3.1.0
info:
  title: Spine API
  version: 0.1.0
  description: |
    Spine v0.x API specification. See /architecture/api-operations.md for
    operation semantics, domain rules, and governance model.

servers:
  - url: /api/v1
    description: Spine API v1

security:
  - BearerToken: []

# ─── Paths ──────────────────────────────────────────────────────────────────

paths:

  # ── Artifact Operations ──

  /artifacts:
    post:
      operationId: artifact.create
      summary: Create a new artifact
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactCreateRequest'
      responses:
        '201':
          description: Artifact created
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactCreateResponse'
        '409':
          $ref: '#/components/responses/AlreadyExists'
        '422':
          $ref: '#/components/responses/ValidationFailed'

    get:
      operationId: artifact.list
      summary: List artifacts
      tags: [Artifacts]
      parameters:
        - name: type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: parent_path
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Artifact list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'

  /artifacts/{path}:
    get:
      operationId: artifact.read
      summary: Read an artifact
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
        - name: ref
          in: query
          schema: { type: string }
          description: Git ref to read from (default authoritative branch HEAD)
      responses:
        '200':
          description: Artifact details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactReadResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: artifact.update
      summary: Update an artifact
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactUpdateRequest'
      responses:
        '200':
          description: Artifact updated
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactUpdateResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /artifacts/{path}/validate:
    post:
      operationId: artifact.validate
      summary: Validate an artifact
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: Content to validate (if omitted, validates current artifact)
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'

  /artifacts/{path}/links:
    get:
      operationId: artifact.links
      summary: Query artifact relationships
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
        - name: link_type
          in: query
          schema: { type: string }
        - name: direction
          in: query
          schema:
            type: string
            enum: [outgoing, incoming, both]
            default: outgoing
      responses:
        '200':
          description: Artifact links
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactLinksResponse'

  # ── Workflow Operations ──

  /runs:
    post:
      operationId: run.start
      summary: Start a new Run for a task or planning run for artifact creation
      description: |
        Starts a standard run (default) or a planning run for governed artifact creation.
        Standard mode requires task_path. Planning mode requires artifact_content and
        creates the artifact on a branch via StartPlanningRun (per ADR-006).
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Conditional requirements: task_path is required when mode is standard or omitted.
                artifact_content is required when mode is planning.
              properties:
                task_path:
                  type: string
                  description: Path to the task artifact. Required when mode is standard or omitted.
                mode:
                  type: string
                  enum: [standard, planning]
                  default: standard
                  description: Run mode. Standard executes against existing artifacts. Planning creates new artifacts on a branch.
                artifact_content:
                  type: string
                  description: Full artifact content (frontmatter + body). Required when mode is planning.
      responses:
        '201':
          description: Run created
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /runs/{run_id}:
    get:
      operationId: run.status
      summary: Query Run execution state
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /runs/{run_id}/cancel:
    post:
      operationId: run.cancel
      summary: Cancel an in-progress Run
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Run cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCancelResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /steps/{assignment_id}/submit:
    post:
      operationId: step.submit
      summary: Submit step result
      tags: [Workflow]
      parameters:
        - name: assignment_id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepSubmitRequest'
      responses:
        '200':
          description: Step result accepted
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepSubmitResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /runs/{run_id}/steps/{step_id}/assign:
    post:
      operationId: step.assign
      summary: Assign actor to a step
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/RunId'
        - name: step_id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor_id]
              properties:
                actor_id:
                  type: string
      responses:
        '200':
          description: Actor assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── Task Governance Operations ──

  /tasks/{path}/accept:
    post:
      operationId: task.accept
      summary: Record task acceptance
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rationale:
                  type: string
      responses:
        '200':
          description: Task accepted
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  /tasks/{path}/reject:
    post:
      operationId: task.reject
      summary: Record task rejection
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [acceptance, rationale]
              properties:
                acceptance:
                  type: string
                  enum: [rejected_with_followup, rejected_closed]
                rationale:
                  type: string
                followup_path:
                  type: string
      responses:
        '200':
          description: Task rejected
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  /tasks/{path}/cancel:
    post:
      operationId: task.cancel
      summary: Cancel a task
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rationale]
              properties:
                rationale:
                  type: string
      responses:
        '200':
          description: Task cancelled
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  /tasks/{path}/abandon:
    post:
      operationId: task.abandon
      summary: Abandon a task
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rationale]
              properties:
                rationale:
                  type: string
      responses:
        '200':
          description: Task abandoned
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  /tasks/{path}/supersede:
    post:
      operationId: task.supersede
      summary: Supersede a task
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [successor_path]
              properties:
                successor_path:
                  type: string
                rationale:
                  type: string
      responses:
        '200':
          description: Task superseded
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  # ── Query Operations ──

  /query/artifacts:
    get:
      operationId: query.artifacts
      summary: Search artifacts
      tags: [Query]
      parameters:
        - name: type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
          description: Full-text search across title and content
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'

  /query/graph:
    get:
      operationId: query.graph
      summary: Retrieve artifact relationship graph
      tags: [Query]
      parameters:
        - name: root
          in: query
          required: true
          description: Root artifact path for graph traversal
          schema: { type: string }
        - name: depth
          in: query
          schema:
            type: integer
            default: 2
            maximum: 5
        - name: link_types
          in: query
          schema:
            type: array
            items: { type: string }
          style: form
          explode: false
      responses:
        '200':
          description: Relationship graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphResponse'

  /query/history:
    get:
      operationId: query.history
      summary: View artifact change history
      tags: [Query]
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Commit history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'

  /query/runs:
    get:
      operationId: query.runs
      summary: List Runs for a task
      tags: [Query]
      parameters:
        - name: task_path
          in: query
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunListResponse'

  # ── System Operations ──

  /system/health:
    get:
      operationId: system.health
      summary: Runtime health check
      tags: [System]
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /system/rebuild:
    post:
      operationId: system.rebuild
      summary: Trigger full projection rebuild
      tags: [System]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '202':
          description: Rebuild started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebuildStartedResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /system/rebuild/{rebuild_id}:
    get:
      operationId: system.rebuild_status
      summary: Query rebuild status
      tags: [System]
      parameters:
        - name: rebuild_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rebuild status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebuildStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /system/validate:
    post:
      operationId: system.validate_all
      summary: Validate all artifacts
      tags: [System]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                categories:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemValidationResponse'

# ─── Components ─────────────────────────────────────────────────────────────

components:

  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      description: API token (per Security Model §3.3)

  headers:
    XTraceId:
      description: Observability trace ID for correlation across systems
      schema: { type: string, format: uuid }

  parameters:
    ArtifactPath:
      name: path
      in: path
      required: true
      schema: { type: string }
      description: Repository-relative artifact path

    TaskPath:
      name: path
      in: path
      required: true
      schema: { type: string }
      description: Repository-relative task artifact path

    RunId:
      name: run_id
      in: path
      required: true
      schema: { type: string }

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 200

    Cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: Opaque pagination cursor

    XTraceId:
      name: X-Trace-Id
      in: header
      schema: { type: string, format: uuid }
      description: Observability trace ID. Generated by server if omitted.

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string }
      description: Idempotency key for write operations. Falls back to X-Trace-Id if omitted.

  schemas:

    # ── Common ──

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        detail:
          type: object
          description: Error-specific structured detail
          properties:
            rule_id: { type: string }
            artifact_path: { type: string }
            field: { type: string }
            severity: { type: string }
            required_role: { type: string }
            actor_role: { type: string }
            required_skill: { type: string }

    PaginationMeta:
      type: object
      properties:
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    WriteContext:
      type: object
      description: Controls where artifact writes land (authoritative branch vs task branch)
      properties:
        run_id:
          type: string
          description: If provided, write targets the task branch for this Run
        task_path:
          type: string
          description: Task context for the write (required when run_id is provided)

    # ── Artifact Schemas ──

    ArtifactSummary:
      type: object
      required: [artifact_path, artifact_type]
      properties:
        artifact_path: { type: string }
        artifact_id: { type: string }
        artifact_type: { type: string }
        status: { type: string }
        title: { type: string }

    ArtifactCreateRequest:
      type: object
      required: [path, content]
      properties:
        path: { type: string }
        content: { type: string }
        write_context:
          $ref: '#/components/schemas/WriteContext'

    ArtifactCreateResponse:
      type: object
      required: [artifact_path, artifact_type, commit_sha, trace_id]
      properties:
        artifact_path: { type: string }
        artifact_id: { type: string }
        artifact_type: { type: string }
        commit_sha: { type: string }
        trace_id: { type: string }
        write_mode: { type: string, enum: [authoritative, proposed] }

    ArtifactReadResponse:
      type: object
      required: [artifact_path, artifact_type, source_commit]
      properties:
        artifact_path: { type: string }
        artifact_id: { type: string }
        artifact_type: { type: string }
        status: { type: string }
        title: { type: string }
        metadata: { type: object }
        content: { type: string }
        source_commit: { type: string }

    ArtifactUpdateRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
        write_context:
          $ref: '#/components/schemas/WriteContext'

    ArtifactUpdateResponse:
      type: object
      required: [artifact_path, commit_sha, trace_id]
      properties:
        artifact_path: { type: string }
        commit_sha: { type: string }
        trace_id: { type: string }
        write_mode: { type: string, enum: [authoritative, proposed] }

    ArtifactListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ArtifactSummary'

    ArtifactLinksResponse:
      type: object
      required: [artifact_path, links]
      properties:
        artifact_path: { type: string }
        links:
          type: array
          items:
            type: object
            required: [direction, link_type, target_path]
            properties:
              direction: { type: string, enum: [outgoing, incoming] }
              link_type: { type: string }
              target_path: { type: string }

    ValidationResult:
      type: object
      required: [artifact_path, status]
      properties:
        artifact_path: { type: string }
        status: { type: string, enum: [passed, failed, warnings] }
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/Error'

    # ── Run Schemas ──

    RunResponse:
      type: object
      required: [run_id, task_path, workflow_id, status, trace_id]
      properties:
        run_id: { type: string }
        task_path: { type: string }
        workflow_id: { type: string }
        workflow_version: { type: string }
        trace_id: { type: string }
        status: { type: string }
        mode: { type: string, enum: [standard, planning], description: "Run mode — standard or planning" }

    StepExecution:
      type: object
      required: [execution_id, step_id, status, attempt]
      properties:
        execution_id: { type: string }
        step_id: { type: string }
        status: { type: string }
        actor_id: { type: string, nullable: true }
        outcome_id: { type: string, nullable: true }
        attempt: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }

    RunStatusResponse:
      type: object
      required: [run_id, task_path, workflow_id, status, trace_id]
      properties:
        run_id: { type: string }
        task_path: { type: string }
        workflow_id: { type: string }
        status: { type: string }
        mode: { type: string, enum: [standard, planning], description: "Run mode — standard or planning" }
        current_step_id: { type: string, nullable: true }
        trace_id: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        step_executions:
          type: array
          items:
            $ref: '#/components/schemas/StepExecution'

    RunCancelResponse:
      type: object
      required: [run_id, status]
      properties:
        run_id: { type: string }
        status: { type: string, enum: [cancelled] }

    RunListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/RunResponse'

    # ── Step Schemas ──

    StepSubmitRequest:
      type: object
      required: [outcome_id]
      properties:
        outcome_id:
          type: string
          description: One of the step's declared outcomes
        output:
          type: object
          properties:
            artifacts_produced:
              type: array
              items:
                type: object
                required: [path]
                properties:
                  path: { type: string }
                  artifact_type: { type: string }
                  status: { type: string, enum: [proposed, final] }
            data: { type: object }
            summary: { type: string }
        rationale:
          type: string
          description: Actor's notes or reasoning for this outcome
        validation_status:
          type: string
          enum: [passed, failed, skipped, not_run]
          description: Self-reported validation status of produced artifacts

    StepSubmitResponse:
      type: object
      required: [execution_id, step_id, outcome_id]
      properties:
        execution_id: { type: string }
        step_id: { type: string }
        outcome_id: { type: string }
        next_step: { type: string, nullable: true }
        commit_sha: { type: string, nullable: true }
        write_mode: { type: string, enum: [authoritative, proposed], nullable: true }
        validation_result:
          $ref: '#/components/schemas/ValidationResult'
        run_advanced: { type: boolean, description: Whether the Run moved to the next step }
        requires_review: { type: boolean, description: Whether the next step is a review step }

    AssignmentResponse:
      type: object
      required: [assignment_id, run_id, step_id, actor_id, status]
      properties:
        assignment_id: { type: string }
        run_id: { type: string }
        step_id: { type: string }
        actor_id: { type: string }
        status: { type: string, enum: [active] }

    # ── Task Governance Schemas ──

    TaskGovernanceResponse:
      type: object
      required: [task_path, status, commit_sha, trace_id]
      properties:
        task_path: { type: string }
        status: { type: string }
        acceptance: { type: string, nullable: true }
        commit_sha: { type: string }
        trace_id: { type: string }

    # ── Query Schemas ──

    GraphResponse:
      type: object
      required: [root, nodes, edges]
      properties:
        root: { type: string }
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactSummary'
        edges:
          type: array
          items:
            type: object
            required: [source, target, link_type]
            properties:
              source: { type: string }
              target: { type: string }
              link_type: { type: string }

    HistoryEntry:
      type: object
      required: [commit_sha, timestamp, author, message]
      properties:
        commit_sha: { type: string }
        timestamp: { type: string, format: date-time }
        author: { type: string }
        message: { type: string }
        trace_id: { type: string, nullable: true }
        operation: { type: string, nullable: true }

    HistoryResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/HistoryEntry'

    # ── System Schemas ──

    HealthResponse:
      type: object
      required: [status, components]
      properties:
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        components:
          type: object
          additionalProperties: { type: string }
        projection_lag_ms: { type: integer }
        active_runs: { type: integer }

    RebuildStartedResponse:
      type: object
      required: [status, rebuild_id]
      properties:
        status: { type: string, enum: [started] }
        rebuild_id: { type: string }

    RebuildStatusResponse:
      type: object
      required: [rebuild_id, status]
      properties:
        rebuild_id: { type: string }
        status: { type: string, enum: [in_progress, completed, failed] }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
        artifacts_processed: { type: integer, nullable: true }
        error_detail: { type: string, nullable: true }

    SystemValidationResponse:
      type: object
      required: [status, total_artifacts]
      properties:
        status: { type: string, enum: [passed, failed, warnings] }
        total_artifacts: { type: integer }
        passed: { type: integer }
        warnings: { type: integer }
        failed: { type: integer }
        results:
          type: array
          items:
            $ref: '#/components/schemas/ValidationResult'

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'

    AlreadyExists:
      description: Resource already exists
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'

    ValidationFailed:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'

    Conflict:
      description: Operation conflicts with current state
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
