openapi: 3.1.0
info:
  title: Spine API
  version: 0.1.0
  description: |
    Spine v0.x API specification. See /architecture/api-operations.md for
    operation semantics, domain rules, and governance model.

servers:
  - url: /api/v1
    description: Spine API v1

security:
  - BearerToken: []

# ─── Paths ──────────────────────────────────────────────────────────────────

paths:

  # ── Artifact Operations ──

  /artifacts:
    post:
      operationId: artifact.create
      summary: Create a new artifact
      description: |
        Creates a new governed artifact. Workflow definition paths are rejected —
        per ADR-007, workflow definitions must be created through `workflow.create`
        (`POST /workflows`).
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactCreateRequest'
      responses:
        '201':
          description: Artifact created
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactCreateResponse'
        '400':
          $ref: '#/components/responses/InvalidParams'
        '409':
          $ref: '#/components/responses/AlreadyExists'
        '422':
          $ref: '#/components/responses/ValidationFailed'

    get:
      operationId: artifact.list
      summary: List artifacts
      tags: [Artifacts]
      parameters:
        - name: type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: parent_path
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Artifact list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'

  /artifacts/entry:
    post:
      operationId: artifact.entry
      summary: Create artifact through governed workflow
      description: |
        Allocates the next sequential ID, builds artifact content, and starts a
        planning run with the appropriate creation workflow. This is the high-level
        artifact creation entry point — it handles ID allocation, slug generation,
        parent resolution, and workflow binding automatically.
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactEntryCreateRequest'
      responses:
        '201':
          description: Planning run started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactEntryCreateResponse'
        '400':
          description: Invalid input (missing title, unsupported type, wrong parent type)
        '404':
          description: Parent artifact not found

  /artifacts/add:
    post:
      operationId: artifact.add
      summary: Add artifact to a planning run branch
      description: |
        Adds an artifact to an existing planning run's branch. Only works while
        the run is in the draft step. Scans the branch (not main) for the next
        available ID. The parent must exist on the branch or on main.

        Workflow definition paths are rejected — per ADR-007, workflow
        definitions must be created through `workflow.create` (`POST /workflows`).
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactAddRequest'
      responses:
        '201':
          description: Artifact created on branch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactAddResponse'
        '400':
          $ref: '#/components/responses/InvalidParams'
        '404':
          description: Run not found
        '409':
          description: Run is past the draft step

  /artifacts/{path}:
    get:
      operationId: artifact.read
      summary: Read an artifact
      description: |
        Reads an artifact by repository-relative path. For workflow definition
        paths, the response contains summary metadata only (no executable body).
        Use `workflow.read` (`GET /workflows/{id}`) to retrieve the executable
        workflow definition.
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
        - name: ref
          in: query
          schema: { type: string }
          description: Git ref to read from (default authoritative branch HEAD)
      responses:
        '200':
          description: Artifact details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactReadResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: artifact.update
      summary: Update an artifact
      description: |
        Updates a governed artifact. Workflow definition paths are rejected —
        per ADR-007, workflow definitions must be updated through `workflow.update`
        (`PUT /workflows/{id}`).
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactUpdateRequest'
      responses:
        '200':
          description: Artifact updated
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactUpdateResponse'
        '400':
          $ref: '#/components/responses/InvalidParams'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /artifacts/{path}/validate:
    post:
      operationId: artifact.validate
      summary: Validate an artifact
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: Content to validate (if omitted, validates current artifact)
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'

  /artifacts/{path}/links:
    get:
      operationId: artifact.links
      summary: Query artifact relationships
      tags: [Artifacts]
      parameters:
        - $ref: '#/components/parameters/ArtifactPath'
        - name: link_type
          in: query
          schema: { type: string }
        - name: direction
          in: query
          schema:
            type: string
            enum: [outgoing, incoming, both]
            default: outgoing
      responses:
        '200':
          description: Artifact links
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactLinksResponse'

  # ── Workflow Definition Operations ──
  # See ADR-007 for rationale. Dedicated resource so workflow-specific
  # validation (step-reference integrity, cycle detection, divergence/
  # convergence balance) runs in a single code path and malformed
  # definitions fail at write time rather than Run execution time.

  /workflows:
    post:
      operationId: workflow.create
      summary: Create a new workflow definition
      description: |
        Creates a new workflow definition. The full workflow validation suite
        (per /architecture/workflow-validation.md) runs before commit. On
        validation failure, no Git state changes.
      tags: [Workflows]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCreateRequest'
      responses:
        '201':
          description: Workflow created
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowWriteResponse'
        '400':
          $ref: '#/components/responses/InvalidParams'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/AlreadyExists'
        '422':
          $ref: '#/components/responses/ValidationFailed'

    get:
      operationId: workflow.list
      summary: List workflow definitions
      description: |
        Returns workflow definition summaries only (no executable body).
      tags: [Workflows]
      parameters:
        - name: applies_to
          in: query
          schema: { type: string }
          description: Filter by artifact type the workflow applies to
        - name: status
          in: query
          schema:
            type: string
            enum: [Active, Deprecated, Superseded]
        - name: mode
          in: query
          schema:
            type: string
            enum: [execution, creation]
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Workflow definition list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowListResponse'

  /workflows/{id}:
    get:
      operationId: workflow.read
      summary: Read a workflow definition
      description: |
        Returns the executable workflow definition body. This is the only
        endpoint that returns the full body — `artifact.read`, `query.artifacts`,
        and `query.graph` return summary metadata only.
      tags: [Workflows]
      parameters:
        - $ref: '#/components/parameters/WorkflowId'
        - name: version
          in: query
          schema: { type: string }
          description: Optional specific version (default latest on authoritative branch)
        - name: ref
          in: query
          schema: { type: string }
          description: Git ref to read from (default authoritative branch HEAD)
      responses:
        '200':
          description: Workflow definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowReadResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: workflow.update
      summary: Update a workflow definition
      description: |
        Updates an existing workflow definition. Version bump relative to the
        prior definition is required. The full workflow validation suite runs
        before commit.
      tags: [Workflows]
      parameters:
        - $ref: '#/components/parameters/WorkflowId'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowUpdateRequest'
      responses:
        '200':
          description: Workflow updated
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowWriteResponse'
        '400':
          $ref: '#/components/responses/InvalidParams'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /workflows/{id}/validate:
    post:
      operationId: workflow.validate
      summary: Validate a workflow definition without persisting
      description: |
        Runs the workflow validation suite against a candidate body. No Git
        state changes regardless of outcome.
      tags: [Workflows]
      parameters:
        - $ref: '#/components/parameters/WorkflowId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowValidateRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '400':
          $ref: '#/components/responses/InvalidParams'

  # ── Workflow Operations ──

  /runs:
    post:
      operationId: run.start
      summary: Start a new Run for a task or planning run for artifact creation
      description: |
        Starts a standard run (default) or a planning run for governed artifact creation.
        Standard mode requires task_path. Planning mode requires artifact_content and
        creates the artifact on a branch via StartPlanningRun (per ADR-006).
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Conditional requirements: task_path is required when mode is standard or omitted.
                artifact_content is required when mode is planning.
              properties:
                task_path:
                  type: string
                  description: Path to the task artifact. Required when mode is standard or omitted.
                mode:
                  type: string
                  enum: [standard, planning]
                  default: standard
                  description: Run mode. Standard executes against existing artifacts. Planning creates new artifacts on a branch.
                artifact_content:
                  type: string
                  description: Full artifact content (frontmatter + body). Required when mode is planning.
      responses:
        '201':
          description: Run created
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /runs/{run_id}:
    get:
      operationId: run.status
      summary: Query Run execution state
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /runs/{run_id}/cancel:
    post:
      operationId: run.cancel
      summary: Cancel an in-progress Run
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Run cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCancelResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /steps/{assignment_id}/submit:
    post:
      operationId: step.submit
      summary: Submit step result
      tags: [Workflow]
      parameters:
        - name: assignment_id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepSubmitRequest'
      responses:
        '200':
          description: Step result accepted
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepSubmitResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /runs/{run_id}/steps/{step_id}/assign:
    post:
      operationId: step.assign
      summary: Assign actor to a step
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/RunId'
        - name: step_id
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor_id]
              properties:
                actor_id:
                  type: string
      responses:
        '200':
          description: Actor assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── Task Governance Operations ──

  /tasks/{path}/accept:
    post:
      operationId: task.accept
      summary: Record task acceptance
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rationale:
                  type: string
      responses:
        '200':
          description: Task accepted
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  /tasks/{path}/reject:
    post:
      operationId: task.reject
      summary: Record task rejection
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [acceptance, rationale]
              properties:
                acceptance:
                  type: string
                  enum: [rejected_with_followup, rejected_closed]
                rationale:
                  type: string
                followup_path:
                  type: string
      responses:
        '200':
          description: Task rejected
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  /tasks/{path}/cancel:
    post:
      operationId: task.cancel
      summary: Cancel a task
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rationale]
              properties:
                rationale:
                  type: string
      responses:
        '200':
          description: Task cancelled
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  /tasks/{path}/abandon:
    post:
      operationId: task.abandon
      summary: Abandon a task
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rationale]
              properties:
                rationale:
                  type: string
      responses:
        '200':
          description: Task abandoned
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  /tasks/{path}/supersede:
    post:
      operationId: task.supersede
      summary: Supersede a task
      tags: [Task Governance]
      parameters:
        - $ref: '#/components/parameters/TaskPath'
        - $ref: '#/components/parameters/XTraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [successor_path]
              properties:
                successor_path:
                  type: string
                rationale:
                  type: string
      responses:
        '200':
          description: Task superseded
          headers:
            X-Trace-Id: { $ref: '#/components/headers/XTraceId' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGovernanceResponse'

  # ── Query Operations ──

  /query/artifacts:
    get:
      operationId: query.artifacts
      summary: Search artifacts
      tags: [Query]
      parameters:
        - name: type
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
          description: Full-text search across title and content
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'

  /query/graph:
    get:
      operationId: query.graph
      summary: Retrieve artifact relationship graph
      tags: [Query]
      parameters:
        - name: root
          in: query
          required: true
          description: Root artifact path for graph traversal
          schema: { type: string }
        - name: depth
          in: query
          schema:
            type: integer
            default: 2
            maximum: 5
        - name: link_types
          in: query
          schema:
            type: array
            items: { type: string }
          style: form
          explode: false
      responses:
        '200':
          description: Relationship graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphResponse'

  /query/history:
    get:
      operationId: query.history
      summary: View artifact change history
      tags: [Query]
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Commit history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'

  /query/runs:
    get:
      operationId: query.runs
      summary: List Runs for a task
      tags: [Query]
      parameters:
        - name: task_path
          in: query
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunListResponse'

  # ── System Operations ──

  /system/health:
    get:
      operationId: system.health
      summary: Runtime health check
      tags: [System]
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /system/rebuild:
    post:
      operationId: system.rebuild
      summary: Trigger full projection rebuild
      tags: [System]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      responses:
        '202':
          description: Rebuild started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebuildStartedResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /system/rebuild/{rebuild_id}:
    get:
      operationId: system.rebuild_status
      summary: Query rebuild status
      tags: [System]
      parameters:
        - name: rebuild_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rebuild status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebuildStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /system/validate:
    post:
      operationId: system.validate_all
      summary: Validate all artifacts
      tags: [System]
      parameters:
        - $ref: '#/components/parameters/XTraceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                categories:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemValidationResponse'

# ─── Components ─────────────────────────────────────────────────────────────

components:

  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
      description: API token (per Security Model §3.3)

  headers:
    XTraceId:
      description: Observability trace ID for correlation across systems
      schema: { type: string, format: uuid }

  parameters:
    ArtifactPath:
      name: path
      in: path
      required: true
      schema: { type: string }
      description: Repository-relative artifact path

    TaskPath:
      name: path
      in: path
      required: true
      schema: { type: string }
      description: Repository-relative task artifact path

    RunId:
      name: run_id
      in: path
      required: true
      schema: { type: string }

    WorkflowId:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: Stable workflow identifier (e.g. `task-default`)

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 200

    Cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: Opaque pagination cursor

    XTraceId:
      name: X-Trace-Id
      in: header
      schema: { type: string, format: uuid }
      description: Observability trace ID. Generated by server if omitted.

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string }
      description: Idempotency key for write operations. Falls back to X-Trace-Id if omitted.

  schemas:

    # ── Artifact Entry ──

    ArtifactEntryCreateRequest:
      type: object
      required: [artifact_type, title]
      properties:
        artifact_type:
          type: string
          enum: [Task, Epic, Initiative]
          description: Type of artifact to create
        parent:
          type: string
          description: Parent artifact ID (required for Task and Epic)
        title:
          type: string
          description: Human-readable artifact title

    ArtifactEntryCreateResponse:
      type: object
      properties:
        run_id: { type: string, description: Planning run ID }
        artifact_id: { type: string, description: Allocated artifact ID (e.g., TASK-006) }
        artifact_path: { type: string, description: Full artifact path }
        branch: { type: string, description: Planning run branch name }
        workflow_id: { type: string, description: Resolved creation workflow ID }
        trace_id: { type: string }

    ArtifactAddRequest:
      type: object
      required: [run_id, artifact_type, parent, title]
      properties:
        run_id:
          type: string
          description: Planning run to add the artifact to
        artifact_type:
          type: string
          enum: [Task, Epic]
          description: Type of artifact to add
        parent:
          type: string
          description: Parent artifact ID (on the branch or main)
        title:
          type: string
          description: Human-readable artifact title

    ArtifactAddResponse:
      type: object
      properties:
        artifact_id: { type: string, description: Allocated artifact ID }
        artifact_path: { type: string, description: Full artifact path on branch }
        branch: { type: string, description: Planning run branch name }
        trace_id: { type: string }

    # ── Common ──

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        detail:
          type: object
          description: Error-specific structured detail
          properties:
            rule_id: { type: string }
            artifact_path: { type: string }
            field: { type: string }
            severity: { type: string }
            required_role: { type: string }
            actor_role: { type: string }
            required_skill: { type: string }

    PaginationMeta:
      type: object
      properties:
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    WriteContext:
      type: object
      description: Controls where artifact writes land (authoritative branch vs task branch) and opts into the branch-protection override surface.
      properties:
        run_id:
          type: string
          description: If provided, write targets the task branch for this Run
        task_path:
          type: string
          description: Task context for the write (required when run_id is provided)
        override:
          type: boolean
          default: false
          description: |
            Opts the caller into the per-operation branch-protection override
            (ADR-009 §4). The policy gate is effective only for actors with
            `operator+` role; lower roles see a 403 with reason
            `override_not_authorised`. An honored override on the Spine API
            path emits a `branch_protection.override` governance event and
            adds a `Branch-Protection-Override: true` commit trailer. Today
            only artifact endpoints honor this flag — workflow endpoints
            reject `override: true` with 400 (use the ADR-008 operator-
            bypass path instead).

    # ── Artifact Schemas ──

    ArtifactSummary:
      type: object
      required: [artifact_path, artifact_type]
      properties:
        artifact_path: { type: string }
        artifact_id: { type: string }
        artifact_type: { type: string }
        status: { type: string }
        title: { type: string }

    ArtifactCreateRequest:
      type: object
      required: [path, content]
      properties:
        path: { type: string }
        content: { type: string }
        write_context:
          $ref: '#/components/schemas/WriteContext'

    ArtifactCreateResponse:
      type: object
      required: [artifact_path, artifact_type, commit_sha, trace_id]
      properties:
        artifact_path: { type: string }
        artifact_id: { type: string }
        artifact_type: { type: string }
        commit_sha: { type: string }
        trace_id: { type: string }
        write_mode: { type: string, enum: [authoritative, proposed] }

    ArtifactReadResponse:
      type: object
      required: [artifact_path, artifact_type, source_commit]
      properties:
        artifact_path: { type: string }
        artifact_id: { type: string }
        artifact_type: { type: string }
        status: { type: string }
        title: { type: string }
        metadata: { type: object }
        content: { type: string }
        source_commit: { type: string }

    ArtifactUpdateRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
        write_context:
          $ref: '#/components/schemas/WriteContext'

    ArtifactUpdateResponse:
      type: object
      required: [artifact_path, commit_sha, trace_id]
      properties:
        artifact_path: { type: string }
        commit_sha: { type: string }
        trace_id: { type: string }
        write_mode: { type: string, enum: [authoritative, proposed] }

    ArtifactListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ArtifactSummary'

    ArtifactLinksResponse:
      type: object
      required: [artifact_path, links]
      properties:
        artifact_path: { type: string }
        links:
          type: array
          items:
            type: object
            required: [direction, link_type, target_path]
            properties:
              direction: { type: string, enum: [outgoing, incoming] }
              link_type: { type: string }
              target_path: { type: string }

    ValidationResult:
      type: object
      required: [artifact_path, status]
      properties:
        artifact_path: { type: string }
        status: { type: string, enum: [passed, failed, warnings] }
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/Error'

    # ── Workflow Definition Schemas ──

    WorkflowSummary:
      type: object
      required: [id, workflow_path, version, status]
      properties:
        id: { type: string, description: Stable workflow identifier }
        workflow_path: { type: string, description: Repository-relative path (e.g. /workflows/task-default.yaml) }
        name: { type: string }
        version: { type: string }
        status: { type: string, enum: [Active, Deprecated, Superseded] }
        mode: { type: string, enum: [execution, creation] }
        applies_to:
          type: array
          items: { type: string }
        description: { type: string }

    WorkflowCreateRequest:
      type: object
      required: [id, body]
      properties:
        id:
          type: string
          description: Stable workflow identifier (determines the file path `/workflows/{id}.yaml`)
        body:
          type: string
          description: YAML body of the workflow definition

    WorkflowUpdateRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          description: YAML body of the updated workflow definition (must bump `version`)

    WorkflowValidateRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          description: Candidate YAML body to validate

    WorkflowReadResponse:
      allOf:
        - $ref: '#/components/schemas/WorkflowSummary'
        - type: object
          required: [body, source_commit]
          properties:
            body: { type: string, description: Executable YAML body }
            source_commit: { type: string }

    WorkflowWriteResponse:
      type: object
      required: [id, workflow_path, version, commit_sha, trace_id]
      properties:
        id: { type: string }
        workflow_path: { type: string }
        version: { type: string }
        commit_sha: { type: string }
        trace_id: { type: string }

    WorkflowListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/WorkflowSummary'

    # ── Run Schemas ──

    RunResponse:
      type: object
      required: [run_id, task_path, workflow_id, status, trace_id]
      properties:
        run_id: { type: string }
        task_path: { type: string }
        workflow_id: { type: string }
        workflow_version: { type: string }
        trace_id: { type: string }
        status: { type: string }
        mode: { type: string, enum: [standard, planning], description: "Run mode — standard or planning" }

    StepExecution:
      type: object
      required: [execution_id, step_id, status, attempt]
      properties:
        execution_id: { type: string }
        step_id: { type: string }
        status: { type: string }
        actor_id: { type: string, nullable: true }
        outcome_id: { type: string, nullable: true }
        attempt: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }

    RunStatusResponse:
      type: object
      required: [run_id, task_path, workflow_id, status, trace_id]
      properties:
        run_id: { type: string }
        task_path: { type: string }
        workflow_id: { type: string }
        status: { type: string }
        mode: { type: string, enum: [standard, planning], description: "Run mode — standard or planning" }
        current_step_id: { type: string, nullable: true }
        trace_id: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        step_executions:
          type: array
          items:
            $ref: '#/components/schemas/StepExecution'

    RunCancelResponse:
      type: object
      required: [run_id, status]
      properties:
        run_id: { type: string }
        status: { type: string, enum: [cancelled] }

    RunListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/RunResponse'

    # ── Step Schemas ──

    StepSubmitRequest:
      type: object
      required: [outcome_id]
      properties:
        outcome_id:
          type: string
          description: One of the step's declared outcomes
        output:
          type: object
          properties:
            artifacts_produced:
              type: array
              items:
                type: object
                required: [path]
                properties:
                  path: { type: string }
                  artifact_type: { type: string }
                  status: { type: string, enum: [proposed, final] }
            data: { type: object }
            summary: { type: string }
        rationale:
          type: string
          description: Actor's notes or reasoning for this outcome
        validation_status:
          type: string
          enum: [passed, failed, skipped, not_run]
          description: Self-reported validation status of produced artifacts

    StepSubmitResponse:
      type: object
      required: [execution_id, step_id, outcome_id]
      properties:
        execution_id: { type: string }
        step_id: { type: string }
        outcome_id: { type: string }
        next_step: { type: string, nullable: true }
        commit_sha: { type: string, nullable: true }
        write_mode: { type: string, enum: [authoritative, proposed], nullable: true }
        validation_result:
          $ref: '#/components/schemas/ValidationResult'
        run_advanced: { type: boolean, description: Whether the Run moved to the next step }
        requires_review: { type: boolean, description: Whether the next step is a review step }

    AssignmentResponse:
      type: object
      required: [assignment_id, run_id, step_id, actor_id, status]
      properties:
        assignment_id: { type: string }
        run_id: { type: string }
        step_id: { type: string }
        actor_id: { type: string }
        status: { type: string, enum: [active] }

    # ── Task Governance Schemas ──

    TaskGovernanceResponse:
      type: object
      required: [task_path, status, commit_sha, trace_id]
      properties:
        task_path: { type: string }
        status: { type: string }
        acceptance: { type: string, nullable: true }
        commit_sha: { type: string }
        trace_id: { type: string }

    # ── Query Schemas ──

    GraphResponse:
      type: object
      required: [root, nodes, edges]
      properties:
        root: { type: string }
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactSummary'
        edges:
          type: array
          items:
            type: object
            required: [source, target, link_type]
            properties:
              source: { type: string }
              target: { type: string }
              link_type: { type: string }

    HistoryEntry:
      type: object
      required: [commit_sha, timestamp, author, message]
      properties:
        commit_sha: { type: string }
        timestamp: { type: string, format: date-time }
        author: { type: string }
        message: { type: string }
        trace_id: { type: string, nullable: true }
        operation: { type: string, nullable: true }

    HistoryResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/HistoryEntry'

    # ── System Schemas ──

    HealthResponse:
      type: object
      required: [status, components]
      properties:
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        components:
          type: object
          additionalProperties: { type: string }
        projection_lag_ms: { type: integer }
        active_runs: { type: integer }

    RebuildStartedResponse:
      type: object
      required: [status, rebuild_id]
      properties:
        status: { type: string, enum: [started] }
        rebuild_id: { type: string }

    RebuildStatusResponse:
      type: object
      required: [rebuild_id, status]
      properties:
        rebuild_id: { type: string }
        status: { type: string, enum: [in_progress, completed, failed] }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
        artifacts_processed: { type: integer, nullable: true }
        error_detail: { type: string, nullable: true }

    SystemValidationResponse:
      type: object
      required: [status, total_artifacts]
      properties:
        status: { type: string, enum: [passed, failed, warnings] }
        total_artifacts: { type: integer }
        passed: { type: integer }
        warnings: { type: integer }
        failed: { type: integer }
        results:
          type: array
          items:
            $ref: '#/components/schemas/ValidationResult'

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'

    AlreadyExists:
      description: Resource already exists
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'

    ValidationFailed:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'

    Conflict:
      description: Operation conflicts with current state
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'

    InvalidParams:
      description: |
        Request parameters invalid or not permitted on this endpoint. Returned
        by generic artifact write endpoints when the target is a workflow
        definition path (per ADR-007); the error payload names the
        corresponding `workflow.*` operation.
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [error] }
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/Error'
