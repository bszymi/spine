services:
  spine-test-db:
    image: postgres:18-bookworm
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    ports:
      # Loopback-only — host-side Go integration tests connect via
      # localhost:5433. Keep the port mapping, but don't expose it
      # to any LAN interface.
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_TEST_USER:-spine_test}
      - POSTGRES_PASSWORD=${POSTGRES_TEST_PASSWORD:-spine_test}
      - POSTGRES_DB=${POSTGRES_TEST_DB:-spine_test}
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER:-spine_test}"]
      interval: 2s
      timeout: 2s
      retries: 10

  spine-test-localstack:
    image: localstack/localstack:3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    ports:
      # Loopback-only — host-side Go integration tests target
      # http://localhost:4566. Override via SPINE_TEST_AWS_ENDPOINT.
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=secretsmanager
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"secretsmanager\": \"available\"\\|\"secretsmanager\": \"running\"'"]
      interval: 5s
      timeout: 3s
      retries: 20

  spine-test-registry-db:
    image: postgres:18-bookworm
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_TEST_REGISTRY_USER:-spine_registry_test}
      - POSTGRES_PASSWORD=${POSTGRES_TEST_REGISTRY_PASSWORD:-spine_registry_test}
      - POSTGRES_DB=${POSTGRES_TEST_REGISTRY_DB:-spine_registry_test}
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_REGISTRY_USER:-spine_registry_test}"]
      interval: 2s
      timeout: 2s
      retries: 10
